name: 🐛 KeyLock PRO Bug Report
description: Submit an structured bug report directly to the development pipeline.
title: "[Bug]: "
labels: ["bug", "desktop-triage"]
body:
  # 1. User Contact Blocks
  - type: input
    id: first-name
    attributes:
      label: First Name
      placeholder: "e.g., John"
    validations:
      required: true

  - type: input
    id: last-name
    attributes:
      label: Last Name
      placeholder: "e.g., Smith"
    validations:
      required: true

  - type: input
    id: user-email
    attributes:
      label: Email Address
      placeholder: "e.g., user@example.com"
    validations:
      required: true

  # 2. Automated Diagnostic Blocks (Hidden or Locked by guidance)
  - type: input
    id: app-version
    attributes:
      label: Application Version
      description: If launching from the website, please open KeyLock PRO and go to Help > About to find your version number.
      placeholder: "e.g., 2.0.0"
    validations:
      required: true

  - type: input
    id: build-number
    attributes:
      label: Build Number Build Date
      description: If launching from the website, please open KeyLock PRO and go to Help > About to find your Build Number / Build Date.
      placeholder: "e.g., " Build Number: 101 / Build Date: May 2026"
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating System / Environment
      description: This field auto-selects your environment but can be modified manually if cross-reporting.
      options:
        - Windows Desktop
        - macOS
        - Linux
    validations:
      required: true

  # 3. User Narrative Blocks
  - type: textarea
    id: bug-description
    attributes:
      label: Detailed Description of the Issue
      placeholder: "What did you click on before it crashed? Please provide step-by-step instructions so we can reproduce it."
    validations:
      required: true
